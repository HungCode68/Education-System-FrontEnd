<div class="max-w-4xl mx-auto space-y-6">
  
  <div>
    <h1 class="text-2xl font-extrabold text-gray-900 tracking-tight">Phân công giảng dạy</h1>
    <p class="text-sm text-gray-500 mt-1">Sắp xếp giáo viên thuộc tổ bộ môn vào các lớp học tương ứng</p>
  </div>

  <div *ngIf="isLoadingData()" class="py-12 text-center text-indigo-500">
    <svg class="animate-spin inline-block h-8 w-8" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
  </div>

  <div *ngIf="!isLoadingData()" class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
    
    <div class="p-5 border-b border-gray-100 bg-gray-50/50 flex items-center space-x-2 text-indigo-700">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
      <h3 class="font-bold">Thiết lập phân công</h3>
    </div>

    <form [formGroup]="assignForm" (ngSubmit)="submitAssignment()" class="p-6 space-y-6">
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Năm học</label>
          <select formControlName="schoolYearId" class="w-full text-sm bg-gray-50 border border-gray-300 rounded-xl px-4 py-2.5 outline-none focus:border-indigo-500 transition">
            <option value="">-- Chọn Năm học --</option>
            <option *ngFor="let sy of schoolYears()" [value]="sy.id">{{ sy.name }}</option>
          </select>
          <p *ngIf="assignForm.get('schoolYearId')?.invalid && assignForm.get('schoolYearId')?.touched" class="text-xs text-red-500 mt-1">Vui lòng chọn năm học</p>
        </div>
        
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Học kỳ</label>
          <select formControlName="semesterId" class="w-full text-sm bg-gray-50 border border-gray-300 rounded-xl px-4 py-2.5 outline-none focus:border-indigo-500 transition">
            <option value="">-- Chọn Học kỳ --</option>
            <option *ngFor="let sem of semesters()" [value]="sem.id">{{ sem.name }}</option>
          </select>
          <p *ngIf="assignForm.get('semesterId')?.invalid && assignForm.get('semesterId')?.touched" class="text-xs text-red-500 mt-1">Vui lòng chọn học kỳ</p>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-4 border-t border-gray-100">
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Môn học</label>
          <select formControlName="subjectId" class="w-full text-sm bg-gray-50 border border-gray-300 rounded-xl px-4 py-2.5 outline-none focus:border-indigo-500 transition">
            <option value="">-- Chọn Môn học --</option>
            <option *ngFor="let sub of subjects()" [value]="sub.id">{{ sub.name }}</option>
          </select>
          <p *ngIf="assignForm.get('subjectId')?.invalid && assignForm.get('subjectId')?.touched" class="text-xs text-red-500 mt-1">Vui lòng chọn môn học</p>
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Lớp học (Offline)</label>
          <select formControlName="physicalClassId" class="w-full text-sm bg-gray-50 border border-gray-300 rounded-xl px-4 py-2.5 outline-none focus:border-indigo-500 transition">
            <option value="">-- Chọn Lớp học --</option>
            <option *ngFor="let pc of physicalClasses()" [value]="pc.id">{{ pc.name }}</option>
          </select>
          <p *ngIf="assignForm.get('physicalClassId')?.invalid && assignForm.get('physicalClassId')?.touched" class="text-xs text-red-500 mt-1">Vui lòng chọn lớp học</p>
        </div>
      </div>

      <div class="pt-4 border-t border-gray-100">
        <label class="block text-sm font-bold text-gray-700 mb-2">Giáo viên phụ trách (Nội bộ tổ)</label>
        <select formControlName="teacherId" class="w-full text-sm bg-emerald-50 border border-emerald-200 text-emerald-900 font-medium rounded-xl px-4 py-3 outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 transition">
          <option value="">-- Chọn Giáo viên trong tổ --</option>
          <option *ngFor="let t of teachers()" [value]="t.id">{{ t.fullName }} ({{ t.teacherCode }})</option>
        </select>
        <p *ngIf="assignForm.get('teacherId')?.invalid && assignForm.get('teacherId')?.touched" class="text-xs text-red-500 mt-1">Vui lòng chọn giáo viên</p>
      </div>

      <div class="flex justify-end pt-6">
        <button type="submit" [disabled]="assignForm.invalid || isSubmitting()" class="flex items-center px-8 py-3 text-sm font-bold text-white bg-indigo-600 rounded-xl hover:bg-indigo-700 disabled:bg-indigo-300 shadow-md transition">
          <svg *ngIf="isSubmitting()" class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
          {{ isSubmitting() ? 'Đang phân công...' : 'Xác nhận Phân công' }}
        </button>
      </div>

    </form>
  </div>
</div>
