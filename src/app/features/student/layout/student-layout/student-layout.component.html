<div class="min-h-screen bg-gray-50 flex font-sans text-gray-900">

  <aside
    class="fixed inset-y-0 left-0 z-50 w-64 bg-white border-r border-gray-100 shadow-sm transform transition-transform duration-300 ease-in-out lg:translate-x-0 lg:static lg:flex-shrink-0"
    [ngClass]="isSidebarOpen() ? 'translate-x-0' : '-translate-x-full'">

    <div class="h-full flex flex-col">
      <div class="header-logo h-16 flex items-center px-6 border-b border-gray-100">
        <img src="assets/Icon-Dai-hoc-CMC.png" alt="EduSystem Logo" class="w-8 h-8 object-contain mr-3">

        <span class="text-xl font-extrabold text-gray-800 tracking-tight">EduSystem</span>
      </div>

      <div class="px-6 py-4 border-b border-gray-50 bg-indigo-50/30">
        <p class="text-xs font-semibold text-indigo-600 uppercase tracking-wider mb-0.5">Cổng Học Sinh</p>
        <p class="text-sm font-bold text-gray-900 truncate" [title]="studentName()">{{ studentName() }}</p>
      </div>

      <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto custom-scrollbar">

        <div class="px-3 pt-5 pb-2">
          <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Học tập</p>
        </div>

        <a routerLink="/student/my-classes" routerLinkActive="bg-indigo-50 text-indigo-700 font-bold"
          class="flex items-center px-3 py-2.5 text-sm font-medium rounded-xl text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition group">
          <svg class="w-5 h-5 mr-3 text-gray-400 group-hover:text-indigo-600 transition" fill="none"
            stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
            </path>
          </svg>
          Lớp học của tôi
        </a>

        <ng-container *ngIf="physicalClassId() && physicalClassId() !== 'null' && physicalClassId() !== 'undefined'">
          <a [routerLink]="['/student/homeroom-stream', physicalClassId()]"
            routerLinkActive="bg-emerald-50 text-emerald-600 font-bold"
            class="flex items-center justify-between px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 transition-colors">

            <div class="flex items-center gap-3">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z">
                </path>
              </svg>
              <span>Bảng tin lớp</span>
            </div>

            <span *ngIf="announcementService.hasNewAnnouncement()" class="flex h-3 w-3 relative">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-3 w-3 bg-red-500 shadow-sm shadow-red-200"></span>
            </span>

          </a>
        </ng-container>


        <div class="px-3 pt-5 pb-2">
          <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Cá nhân</p>
        </div>

        <a routerLink="/student/profile" routerLinkActive="bg-indigo-50 text-indigo-700"
          class="flex items-center px-3 py-2.5 text-sm font-medium rounded-xl text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition group">
          <svg class="w-5 h-5 mr-3 text-gray-400 group-hover:text-indigo-600 transition" fill="none"
            stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
          </svg>
          Hồ sơ cá nhân
        </a>
      </nav>
    </div>
  </aside>

  <div *ngIf="isSidebarOpen()" (click)="toggleSidebar()"
    class="fixed inset-0 bg-gray-900/50 z-40 lg:hidden backdrop-blur-sm"></div>

  <main class="flex-1 flex flex-col min-w-0 h-screen overflow-hidden">

    <header
      class="h-16 bg-white border-b border-gray-100 flex items-center justify-between px-4 sm:px-6 lg:px-8 shrink-0 shadow-sm z-10">

      <button (click)="toggleSidebar()"
        class="lg:hidden p-2 rounded-md text-gray-400 hover:text-gray-500 hover:bg-gray-100 focus:outline-none">
        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"></path>
        </svg>
      </button>

      <div class="hidden lg:block flex-1"></div>

      <app-notification-bell></app-notification-bell>

      <div class="flex items-center space-x-4">
        <button (click)="logout()"
          class="flex items-center text-sm font-medium text-red-600 hover:text-red-800 bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-lg transition">
          <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
          </svg>
          Đăng xuất
        </button>
      </div>
    </header>

    <div class="flex-1 overflow-auto bg-gray-50/50 p-4 sm:p-6 lg:p-8 relative">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
